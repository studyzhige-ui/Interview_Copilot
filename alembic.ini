[alembic]
script_location = %(here)s/alembic
prepend_sys_path = %(here)s/backend
version_path_separator = os
path_separator = os
# sqlalchemy.url is intentionally NOT set here.
# alembic/env.py reads DATABASE_URL from .env (via app.core.config.settings)
# so credentials never live in a committed file. Override at runtime with:
#   alembic -x url=<override> upgrade head
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
