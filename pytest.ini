[pytest]
pythonpath = backend
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

markers =
    slow: marks tests that require significant time (e.g. model loading)
    integration: marks tests that require external services (DB, Milvus, Redis)

filterwarnings =
    ignore::DeprecationWarning:sqlalchemy
    ignore:datetime.datetime.utcnow:DeprecationWarning
