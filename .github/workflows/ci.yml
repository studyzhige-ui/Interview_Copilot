name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel any in-flight run for the same branch when a new push lands.
# Saves CI minutes during rapid iteration (two pushes in 30s no longer
# means two full pipelines run to completion). ``group`` is the ref so
# main/develop runs are independent.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: interview_copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/interview_copilot
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEEPSEEK_API_KEY: test-key-not-real
      HF_ENDPOINT: https://hf-mirror.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Compile check
        run: python -m compileall -q backend/app

      - name: Run unit tests
        # ``-x`` removed so a single failure doesn't hide the rest of the
        # regression surface — we'd rather see all failing tests in a PR
        # than chase one at a time. ``test_alembic_migrations`` is no
        # longer ignored: the postgres service above is reachable at
        # localhost:5432, and the file's own ``pytest.mark.skipif(not
        # _pg_available())`` keeps it green in environments without PG.
        run: |
          python -m pytest backend/tests \
            -v \
            --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check backend/app --output-format=github

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        # Non-blocking for now — the v7 eslint-plugin-react-hooks adds
        # several "warning" rules (set-state-in-effect, refs, etc.)
        # that the existing codebase triggers in legitimate places.
        # Surfacing the warnings is enough; making CI red on them
        # would require a sweep that's its own follow-up. Errors
        # (rules-of-hooks, parse errors) still fail the job because
        # they're truly broken code.
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE: /api/v1

      - name: Test (vitest)
        # ``test:run`` is the one-shot CI variant; bare ``test`` enters
        # watch mode and would hang the job. Vitest + RTL + jsdom were
        # added in P2-E — until this step landed, the test files
        # rotted silently.
        run: npm run test:run
