# Production TLS variant of frontend.conf.
#
# Use this INSTEAD OF frontend.conf when terminating TLS at this nginx
# (i.e. the public ingress is this container, not a higher-tier Caddy /
# ALB / Cloudflare that's already doing TLS).
#
# Mount it into the frontend image at deploy time:
#
#   docker run -d \
#     -v $PWD/nginx/conf.d/frontend.tls.conf:/etc/nginx/conf.d/frontend.conf:ro \
#     -v /etc/letsencrypt/live/<domain>:/etc/nginx/certs:ro \
#     -p 443:443 -p 80:80 \
#     interview-copilot-frontend
#
# Or in compose under the `frontend` service:
#
#   volumes:
#     - ./nginx/conf.d/frontend.tls.conf:/etc/nginx/conf.d/frontend.conf:ro
#     - /etc/letsencrypt/live/<domain>:/etc/nginx/certs:ro
#   ports:
#     - "443:443"
#     - "80:80"
#
# Cert lifecycle: handled outside this container — point certbot (or
# whatever your TLS automation is) at the host path you mounted.

map $request $request_safe {
    "~*^([^?]+)\?.*token=[^&\s]*(&.*)?$" "$1?[redacted]";
    default $request;
}

map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    ""      $scheme;
    "~^."   $http_x_forwarded_proto;
}

log_format ic_safe '$remote_addr - $remote_user [$time_local] '
                   '"$request_safe" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent"';

upstream interview_copilot_api {
    server backend:8080;
    keepalive 32;
}

# ── Port 80: redirect everything to HTTPS ─────────────────────────────
# Letsencrypt http-01 challenge needs /.well-known/acme-challenge to
# stay reachable on HTTP, so we exempt that path from the redirect.
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Port 443: the real server ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;
    access_log /var/log/nginx/access.log ic_safe;

    # ── TLS certificates ───────────────────────────────────────────────
    # Adjust these paths to match your mount. Letsencrypt's default
    # layout puts fullchain.pem + privkey.pem in
    # /etc/letsencrypt/live/<domain>/.
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Modern TLS only. Drop TLS 1.0/1.1 — they're broken and no real
    # browser / mobile app needs them anymore.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # 500 MiB — same as frontend.conf.
    client_max_body_size 500M;
    client_body_timeout 120s;

    # ── Security headers ───────────────────────────────────────────────
    # HSTS only on the HTTPS server block (never on port 80, or you'd
    # pin even local-dev browsers to https forever).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;
    # CSP starts strict; if the frontend pulls in third-party fonts /
    # CDN scripts you'll need to extend script-src / style-src
    # accordingly. Inline scripts are blocked — Vite's production build
    # doesn't ship any, but verify with the browser console after a
    # deploy.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; connect-src 'self' https://api.langsmith.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ── SPA static ─────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── WebSocket ─────────────────────────────────────────────────────
    location /api/v1/chat/ws/ {
        proxy_pass http://interview_copilot_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ── SSE / streaming ────────────────────────────────────────────────
    location ~ ^/api/v1/(.*/sse/|.*/stream/|interview/.*/analyze-stream) {
        proxy_pass http://interview_copilot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 600s;
    }

    # ── Generic API proxy ─────────────────────────────────────────────
    location /api/v1/ {
        proxy_pass http://interview_copilot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
