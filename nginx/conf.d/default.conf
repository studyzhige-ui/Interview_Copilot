server {
    listen 80;
    server_name localhost;

    # Allow large interview audio/video uploads through the gateway.
    client_max_body_size 500M;

    # ── Dev-safe security headers ─────────────────────────────────────
    # No HSTS here — pinning localhost to HTTPS would break every dev
    # session and is sticky for months. The other headers cost nothing
    # in dev and catch the "I forgot to wire up FastAPI middleware"
    # class of regression early.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Forward all API traffic to the FastAPI service running on the host.
    location / {
        proxy_pass http://host.docker.internal:8080;

        # Preserve client and protocol headers for application logs/auth.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep WebSocket and streaming responses working through Nginx.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
