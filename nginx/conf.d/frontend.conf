# Frontend nginx config — serves the React SPA static files and proxies
# /api/v1 + /api/v1/chat/ws/* to the FastAPI backend.
#
# Used by the frontend Docker image (see frontend/Dockerfile). For local
# dev where uvicorn proxies directly via Vite, ignore this file.

# Strip ?token=... from the access log so WS bearer tokens don't get
# persisted in plain text to disk / log shipping.
map $request $request_safe {
    "~*^([^?]+)\?.*token=[^&\s]*(&.*)?$" "$1?[redacted]";
    default $request;
}

# Preserve the original protocol when we're chained behind another TLS
# terminator (Caddy / AWS ALB / Cloudflare → this nginx → backend).
# If the inbound request already carries X-Forwarded-Proto we forward that
# value verbatim so the FastAPI HSTS middleware sees "https"; otherwise we
# fall back to whatever scheme this nginx itself accepted ($scheme).
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    ""      $scheme;
    "~^."   $http_x_forwarded_proto;
}

log_format ic_safe '$remote_addr - $remote_user [$time_local] '
                   '"$request_safe" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent"';

upstream interview_copilot_api {
    # When wired into docker-compose with service name `backend`, point here.
    # Override at deploy time via a templated config or sed if needed.
    server backend:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    access_log /var/log/nginx/access.log ic_safe;

    # 500 MiB — fits interview audio (mock-interview transcribe) + multi-file
    # knowledge uploads. Tune down if you don't allow audio.
    client_max_body_size 500M;
    client_body_timeout 120s;

    # ── Baseline security headers ──────────────────────────────────────
    # These are also emitted by the FastAPI middleware in app/main.py;
    # we duplicate them at the edge so a misconfigured app process can't
    # accidentally strip them. ``always`` makes nginx emit them on error
    # responses too (e.g. 502 from upstream timeout) where add_header
    # would otherwise be silently dropped.
    #
    # HSTS is intentionally NOT here — only the TLS server block (see
    # frontend.tls.conf) should pin browsers to HTTPS, otherwise local
    # HTTP development gets cached as "https only" forever.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;

    # ── SPA static ─────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the hashed asset bundles; the HTML shell is uncached so
    # users always pick up the latest deploy on next page load.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path serves the shell so React Router can
    # handle it client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── WebSocket: long-lived, no buffering ────────────────────────────
    location /api/v1/chat/ws/ {
        proxy_pass http://interview_copilot_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        # Forward the subprotocol header so the backend can pull the JWT
        # out of "Sec-WebSocket-Protocol: bearer, <token>".
        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ── SSE / streaming: keep the connection open, disable buffering ──
    location ~ ^/api/v1/(.*/sse/|.*/stream/|interview/.*/analyze-stream) {
        proxy_pass http://interview_copilot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 600s;
    }

    # ── Generic API proxy ──────────────────────────────────────────────
    location /api/v1/ {
        proxy_pass http://interview_copilot_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }
}
