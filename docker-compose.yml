services:
  # Local infrastructure only. Run the FastAPI app and Celery worker on the host,
  # or add a Dockerfile/api service before using this compose file for production.
  nginx:
    image: nginx:alpine
    container_name: interview_copilot_nginx
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - copilot_net

  db:
    image: postgres:15-alpine
    container_name: interview_copilot_db
    env_file: .env.docker
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - copilot_net

  redis:
    image: redis:alpine
    container_name: interview_copilot_redis
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - copilot_net

  minio:
    image: minio/minio:latest
    container_name: interview_copilot_minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    env_file: .env.docker
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - copilot_net

  minio-create-bucket:
    image: minio/mc
    container_name: interview_copilot_mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/interview-copilot-bucket --ignore-existing;
      /usr/bin/mc anonymous set public myminio/interview-copilot-bucket;
      exit 0;
      "
    networks:
      - copilot_net

  # Milvus vector database
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: interview_copilot_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus_etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - copilot_net

  milvus-minio:
    image: minio/minio:latest
    container_name: interview_copilot_milvus_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "127.0.0.1:9010:9000"
      - "127.0.0.1:9011:9001"
    volumes:
      - milvus_minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - copilot_net

  milvus-standalone:
    image: milvusdb/milvus:v2.5.6
    container_name: interview_copilot_milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    depends_on:
      milvus-etcd:
        condition: service_started
      milvus-minio:
        condition: service_started
    networks:
      - copilot_net

volumes:
  minio_data:
  pgdata:
  milvus_etcd:
  milvus_minio:
  milvus_data:

networks:
  copilot_net:
    driver: bridge
