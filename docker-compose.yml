services:
  # Local infrastructure only. Run the FastAPI app and Celery worker on the host,
  # or add a Dockerfile/api service before using this compose file for production.
  # Dev-only nginx: proxies all of :80 to the host-running uvicorn.
  # Use with: docker compose --profile dev up -d
  # In `full` mode the `frontend` service replaces this with a real SPA
  # nginx that fronts the API, so it'd collide on port 80 if it ran here.
  nginx:
    profiles: [dev]
    image: nginx:alpine
    container_name: interview_copilot_nginx
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - copilot_net

  db:
    image: postgres:15-alpine
    container_name: interview_copilot_db
    env_file: .env.docker
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - copilot_net

  redis:
    image: redis:alpine
    container_name: interview_copilot_redis
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - copilot_net

  minio:
    image: minio/minio:latest
    container_name: interview_copilot_minio
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    env_file: .env.docker
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - copilot_net

  minio-create-bucket:
    image: minio/mc
    container_name: interview_copilot_mc
    depends_on:
      - minio
    # Read MINIO_ROOT_USER / MINIO_ROOT_PASSWORD / S3_BUCKET_NAME from
    # .env.docker so they stay in sync with the minio service. Defaults
    # are the example values used when the file is missing.
    env_file: .env.docker
    environment:
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-interview-copilot-bucket}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\";
      /usr/bin/mc mb \"myminio/$$S3_BUCKET_NAME\" --ignore-existing;
      exit 0;
      "
    networks:
      - copilot_net

  # Milvus vector database
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: interview_copilot_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - milvus_etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - copilot_net

  milvus-minio:
    image: minio/minio:latest
    container_name: interview_copilot_milvus_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "127.0.0.1:9010:9000"
      - "127.0.0.1:9011:9001"
    volumes:
      - milvus_minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - copilot_net

  milvus-standalone:
    image: milvusdb/milvus:v2.5.6
    container_name: interview_copilot_milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    depends_on:
      milvus-etcd:
        condition: service_started
      milvus-minio:
        condition: service_started
    networks:
      - copilot_net

  # ── Optional: full-stack containerized API + Worker + Frontend ──────
  # Activate with: docker compose --profile full up -d
  api:
    profiles: [full]
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: interview_copilot_api
    env_file: .env
    environment:
      # Container-network URL overrides. Defaults assume the bundled
      # docker-compose services (db / redis / minio / milvus-standalone)
      # AND the default credentials in .env.docker.example.
      #
      # If you customised POSTGRES_USER/PASSWORD or MINIO_ROOT_USER in
      # .env.docker, set the matching `*_DOCKER` overrides in .env so
      # this composition picks them up. Example:
      #     DATABASE_URL_DOCKER=postgresql://myuser:mypass@db:5432/mydb
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@db:5432/interview_copilot}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
      MILVUS_URI: ${MILVUS_URI_DOCKER:-http://milvus-standalone:19530}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL_DOCKER:-http://minio:9000}
      # Worker count — 2 is safe with the default DB pool math
      # (2 * 40 = 80 < 100 PG max_connections). Bump together with
      # postgres max_connections + DB_POOL_SIZE if you want more.
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    # Multi-worker production launch. --reload is dropped (incompatible
    # with --workers > 1) and --proxy-headers tells uvicorn to honour the
    # X-Forwarded-* headers that the frontend nginx forwards.
    command:
      - sh
      - -c
      - >
        uvicorn app.main:app
        --host 0.0.0.0 --port 8080
        --workers ${UVICORN_WORKERS:-2}
        --proxy-headers
        --forwarded-allow-ips=*
    # No host port — the frontend nginx fronts the API. Uncomment to expose
    # the API directly for curl/Postman against the container.
    # ports:
    #   - "127.0.0.1:8080:8080"
    expose:
      - "8080"
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      milvus-standalone:
        condition: service_healthy
    networks:
      - copilot_net
    # Alias the container DNS as `backend` so frontend nginx upstream resolves.
    hostname: backend

  frontend:
    profiles: [full]
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Same-origin deployment: SPA + API behind the one nginx, no absolute URL.
        VITE_API_BASE: /api/v1
    container_name: interview_copilot_frontend
    ports:
      - "127.0.0.1:80:80"
    depends_on:
      api:
        condition: service_started
    networks:
      - copilot_net

  worker:
    profiles: [full]
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: interview_copilot_worker
    env_file: .env
    environment:
      # Same overrides as api — see comment block there for the
      # *_DOCKER override pattern.
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@db:5432/interview_copilot}
      REDIS_URL: ${REDIS_URL_DOCKER:-redis://redis:6379/0}
      MILVUS_URI: ${MILVUS_URI_DOCKER:-http://milvus-standalone:19530}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL_DOCKER:-http://minio:9000}
    command: ["celery", "-A", "app.worker.celery_app.celery_app", "worker", "--loglevel=info", "--pool=solo"]
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - copilot_net

volumes:
  minio_data:
  pgdata:
  milvus_etcd:
  milvus_minio:
  milvus_data:

networks:
  copilot_net:
    driver: bridge
